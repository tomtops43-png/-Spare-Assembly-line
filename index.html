<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock System - GitHub Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .loading-overlay { background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="text-slate-800">

    <!-- Loading State -->
    <div id="loader" class="fixed inset-0 z-[100] flex items-center justify-center loading-overlay hidden">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 font-bold text-blue-800">กำลังประมวลผล...</p>
        </div>
    </div>

    <!-- Layout -->
    <div class="min-h-screen flex flex-col md:flex-row">
        
        <!-- Sidebar -->
        <nav class="w-full md:w-72 bg-slate-900 text-white flex-shrink-0 shadow-2xl">
            <div class="p-8">
                <h1 class="text-2xl font-black text-blue-400 tracking-tighter">STOCK ROOM</h1>
                <p class="text-xs text-slate-500 font-medium">GITHUB + APPS SCRIPT</p>
            </div>
            <div class="px-4 space-y-2">
                <button onclick="switchPage('list')" class="nav-btn w-full flex items-center p-4 rounded-xl transition-all hover:bg-slate-800" id="btn-list">
                    <i data-lucide="table-2" class="mr-3"></i> รายการประวัติ
                </button>
                <button onclick="switchPage('form')" class="nav-btn w-full flex items-center p-4 rounded-xl transition-all hover:bg-slate-800" id="btn-form">
                    <i data-lucide="plus-square" class="mr-3"></i> บันทึกรับ/เบิก
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 p-6 md:p-12 overflow-y-auto">
            
            <!-- PAGE: LIST -->
            <div id="page-list" class="page-content space-y-6">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <h2 class="text-3xl font-extrabold text-slate-900">ประวัติความเคลื่อนไหว</h2>
                    <button onclick="refreshData()" class="flex items-center px-6 py-3 bg-white border border-slate-200 rounded-2xl shadow-sm hover:shadow-md transition-all active:scale-95 font-bold text-slate-600">
                        <i data-lucide="refresh-ccw" class="w-4 h-4 mr-2" id="refresh-icon"></i> รีเฟรชข้อมูล
                    </button>
                </div>

                <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 border-b border-slate-100">
                                <tr>
                                    <th class="px-6 py-4 text-sm font-bold text-slate-400">วัน-เวลา</th>
                                    <th class="px-6 py-4 text-sm font-bold text-slate-400">ประเภท</th>
                                    <th class="px-6 py-4 text-sm font-bold text-slate-400">Process</th>
                                    <th class="px-6 py-4 text-sm font-bold text-slate-400">Part Name</th>
                                    <th class="px-6 py-4 text-center text-sm font-bold text-slate-400">จำนวน</th>
                                    <th class="px-6 py-4 text-sm font-bold text-slate-400">โดย</th>
                                </tr>
                            </thead>
                            <tbody id="table-body" class="divide-y divide-slate-50">
                                <!-- Data rows injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- PAGE: FORM -->
            <div id="page-form" class="page-content hidden max-w-2xl mx-auto">
                <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-8">
                    <h2 class="text-2xl font-bold mb-8 text-slate-900 flex items-center">
                        <i data-lucide="clipboard-edit" class="mr-3 text-blue-500"></i> บันทึกรายการสต๊อกใหม่
                    </h2>
                    
                    <form id="stockForm" onsubmit="submitForm(event)" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-bold text-slate-500 mb-2">ประเภท</label>
                                <select name="type" required class="w-full bg-slate-50 border-0 p-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                                    <option value="Input(รับเข้า)">Input (รับเข้า)</option>
                                    <option value="Output(เบิกออก)">Output (เบิกออก)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-500 mb-2">Process</label>
                                <input type="text" name="process" placeholder="เช่น Gv.2" required class="w-full bg-slate-50 border-0 p-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-slate-500 mb-2">Part Name</label>
                            <input type="text" name="partName" placeholder="รหัสหรือชื่ออะไหล่" required class="w-full bg-slate-50 border-0 p-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>

                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-bold text-slate-500 mb-2">จำนวน</label>
                                <input type="number" name="qty" required class="w-full bg-slate-50 border-0 p-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-500 mb-2">หน่วย</label>
                                <input type="text" name="unit" value="PCS" class="w-full bg-slate-50 border-0 p-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-slate-500 mb-2">ชื่อผู้ดำเนินการ</label>
                            <input type="text" name="by" placeholder="ระบุชื่อของคุณ" required class="w-full bg-slate-50 border-0 p-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>

                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-lg shadow-blue-200 transition-all active:scale-[0.98]">
                            ส่งข้อมูลไปยัง Google Sheets
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 1. แทนที่ URL นี้ด้วย Web App URL จาก Apps Script
        const API_URL = "YOUR_APPS_SCRIPT_URL_HERE"; 

        window.onload = () => {
            lucide.createIcons();
            if (API_URL.includes("YOUR_APPS_SCRIPT")) {
                alert("คำเตือน: โปรดตั้งค่า API_URL ในไฟล์ index.html ก่อนใช้งาน");
            } else {
                refreshData();
            }
        };

        function switchPage(page) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + page).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-blue-600', 'text-white'));
            document.getElementById('btn-' + page).classList.add('bg-blue-600', 'text-white');
        }

        async function refreshData() {
            setLoading(true);
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('animate-spin');

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                renderTable(data);
            } catch (err) {
                console.error(err);
                alert("ไม่สามารถดึงข้อมูลได้ โปรดตรวจสอบการ Deploy Apps Script");
            } finally {
                setLoading(false);
                icon.classList.remove('animate-spin');
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('table-body');
            // นำข้อมูลล่าสุดขึ้นก่อน (Reverse)
            const rows = data.slice().reverse();
            
            tbody.innerHTML = rows.map(item => {
                const isInput = item['Type (ประเภท)']?.includes('รับเข้า');
                const badgeColor = isInput ? 'bg-green-100 text-green-700' : 'bg-rose-100 text-rose-700';
                
                return `
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td class="px-6 py-4 text-xs font-medium text-slate-400">${formatDate(item['ประทับเวลา'])}</td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${badgeColor}">
                                ${item['Type (ประเภท)'] || 'N/A'}
                            </span>
                        </td>
                        <td class="px-6 py-4 font-bold text-slate-700">${item['Proecess'] || '-'}</td>
                        <td class="px-6 py-4 text-slate-600 font-medium">${item['Part Name '] || item['Part Name'] || '-'}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="text-lg font-black ${isInput ? 'text-green-600' : 'text-rose-600'}">${item['QTY(จำนวน)']}</span>
                            <span class="text-[10px] text-slate-300 ml-1 font-bold">${item['Unit(หน่วย)'] || ''}</span>
                        </td>
                        <td class="px-6 py-4 text-sm text-slate-500">${item['By(โดย)'] || '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        async function submitForm(e) {
            e.preventDefault();
            setLoading(true);
            
            const formData = new FormData(e.target);
            const payload = Object.fromEntries(formData.entries());

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    redirect: 'follow',
                    body: JSON.stringify(payload)
                });
                const res = await response.json();
                
                if (res.status === "success") {
                    alert("บันทึกข้อมูลเรียบร้อยแล้ว!");
                    e.target.reset();
                    switchPage('list');
                    refreshData();
                }
            } catch (err) {
                console.error(err);
                alert("บันทึกไม่สำเร็จ: " + err.message);
            } finally {
                setLoading(false);
            }
        }

        function setLoading(state) {
            const loader = document.getElementById('loader');
            state ? loader.classList.remove('hidden') : loader.classList.add('hidden');
        }

        function formatDate(dateStr) {
            if (!dateStr) return "-";
            const date = new Date(dateStr);
            return date.toLocaleString('th-TH', { 
                year: '2-digit', month: 'short', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }
    </script>
</body>
</html>
