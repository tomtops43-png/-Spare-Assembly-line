<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Management - Assembly Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        .nav-active { background-color: #1e293b; border-left: 4px solid #3b82f6; color: white; }
    </style>
</head>
<body class="text-slate-800">

    <!-- Loading Overlay -->
    <div id="loader" class="fixed inset-0 z-[100] bg-white/80 backdrop-blur-sm flex items-center justify-center hidden">
        <div class="text-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
            <p class="mt-4 font-bold text-slate-600">กำลังโหลดข้อมูล...</p>
        </div>
    </div>

    <div class="min-h-screen flex flex-col md:flex-row">
        <!-- Sidebar -->
        <aside class="w-full md:w-64 bg-slate-900 text-slate-400 flex-shrink-0 shadow-xl overflow-y-auto">
            <div class="p-6 text-center border-b border-slate-800">
                <h1 class="text-xl font-black text-white tracking-widest">ASSEMBLY <span class="text-blue-500">STOCK</span></h1>
            </div>
            <nav class="mt-4 px-2 space-y-1">
                <button onclick="switchTab('dashboard')" id="tab-dashboard-btn" class="nav-item w-full flex items-center px-4 py-3 rounded-lg hover:bg-slate-800 transition-all">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i> แดชบอร์ด
                </button>
                <button onclick="switchTab('inventory')" id="tab-inventory-btn" class="nav-item w-full flex items-center px-4 py-3 rounded-lg hover:bg-slate-800 transition-all">
                    <i data-lucide="package" class="w-5 h-5 mr-3"></i> สต๊อกคงเหลือ
                </button>
                <button onclick="switchTab('records')" id="tab-records-btn" class="nav-item w-full flex items-center px-4 py-3 rounded-lg hover:bg-slate-800 transition-all nav-active">
                    <i data-lucide="history" class="w-5 h-5 mr-3"></i> ประวัติรายการ
                </button>
                <div class="pt-4 pb-2 px-4 text-xs font-bold text-slate-500 uppercase">การจัดการ</div>
                <button onclick="openModal()" class="w-full flex items-center px-4 py-3 text-blue-400 hover:bg-slate-800 rounded-lg transition-all font-bold">
                    <i data-lucide="plus-circle" class="w-5 h-5 mr-3"></i> บันทึก รับ/เบิก
                </button>
            </nav>
        </aside>

        <!-- Main -->
        <main class="flex-1 flex flex-col h-screen overflow-hidden">
            <!-- Header -->
            <header class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center flex-shrink-0">
                <h2 id="page-title" class="text-xl font-bold text-slate-800">ประวัติรายการ</h2>
                <button onclick="refreshData()" class="p-2 hover:bg-slate-100 rounded-full transition-all">
                    <i data-lucide="refresh-cw" id="refresh-icon" class="w-5 h-5 text-slate-500"></i>
                </button>
            </header>

            <!-- Content Area -->
            <div class="flex-1 overflow-y-auto p-4 md:p-8">
                
                <!-- TAB: DASHBOARD -->
                <div id="tab-dashboard" class="tab-pane hidden space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <p class="text-sm font-bold text-slate-400 mb-1">ความเคลื่อนไหวทั้งหมด</p>
                            <h3 id="stat-total" class="text-3xl font-black">0</h3>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <p class="text-sm font-bold text-green-500 mb-1">รับเข้า (เดือนนี้)</p>
                            <h3 id="stat-in" class="text-3xl font-black text-green-600">0</h3>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <p class="text-sm font-bold text-rose-500 mb-1">เบิกออก (เดือนนี้)</p>
                            <h3 id="stat-out" class="text-3xl font-black text-rose-600">0</h3>
                        </div>
                    </div>
                </div>

                <!-- TAB: INVENTORY -->
                <div id="tab-inventory" class="tab-pane hidden space-y-4">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-50 border-b border-slate-100">
                                <tr>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-400">Part Name</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-400">Process (ล่าสุด)</th>
                                    <th class="px-6 py-4 text-center text-xs font-bold text-slate-400">คงเหลือ (QOH)</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-400">หน่วย</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-table-body" class="divide-y divide-slate-50 text-sm"></tbody>
                        </table>
                    </div>
                </div>

                <!-- TAB: RECORDS -->
                <div id="tab-records" class="tab-pane space-y-4">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead class="bg-slate-50 border-b border-slate-100">
                                    <tr class="whitespace-nowrap">
                                        <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">วัน-เวลา</th>
                                        <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">ประเภท</th>
                                        <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">Process</th>
                                        <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">Part Name</th>
                                        <th class="px-6 py-4 text-center text-xs font-bold text-slate-400 uppercase">จำนวน</th>
                                        <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">โดย</th>
                                    </tr>
                                </thead>
                                <tbody id="records-table-body" class="divide-y divide-slate-50 text-sm"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm hidden p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden animate-fade-in">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="text-xl font-bold">บันทึกรายการสต๊อก</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            </div>
            <form id="stock-form" onsubmit="handleFormSubmit(event)" class="p-8 space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2 md:col-span-1">
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">ประเภทการทำรายการ</label>
                        <select name="type" required class="w-full p-3 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-medium">
                            <option value="Input(รับเข้า)">Input (รับเข้า)</option>
                            <option value="Output(เบิกออก)">Output (เบิกออก)</option>
                        </select>
                    </div>
                    <div class="col-span-2 md:col-span-1">
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Process</label>
                        <input type="text" name="process" required placeholder="เช่น Gv.2" class="w-full p-3 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Part Name / Description</label>
                    <input type="text" name="partName" required placeholder="รหัสอะไหล่" class="w-full p-3 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">จำนวน</label>
                        <input type="number" name="qty" required step="any" class="w-full p-3 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2">หน่วย</label>
                        <input type="text" name="unit" value="PCS" class="w-full p-3 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">ผู้ดำเนินการ (By)</label>
                    <input type="text" name="by" required class="w-full p-3 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="pt-4">
                    <button type="submit" id="btn-submit" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 shadow-lg shadow-blue-100 transition-all active:scale-[0.98]">
                        บันทึกข้อมูลลงระบบ
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // *** ใส่ URL ของคุณที่นี่ ***
        const API_URL = "https://script.google.com/macros/s/AKfycbzux-h9XBiryXx2TBdgH1FpIiMf0Jr3FHEO09XvAO70a6Qfk2JQXe4yoF56P_FdROF48w/exec";

        let allData = [];

        window.onload = () => {
            lucide.createIcons();
            refreshData();
        };

        async function refreshData() {
            if (!API_URL) return;
            setLoading(true);
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('animate-spin');

            try {
                const response = await fetch(API_URL);
                allData = await response.json();
                renderRecords(allData);
                renderInventory(allData);
                updateStats(allData);
            } catch (err) {
                console.error(err);
                alert("ไม่สามารถดึงข้อมูลได้ โปรดตรวจสอบการ Deploy และชื่อ Sheet ใน Apps Script");
            } finally {
                setLoading(false);
                icon.classList.remove('animate-spin');
            }
        }

        function renderRecords(data) {
            const tbody = document.getElementById('records-table-body');
            // เรียงจากใหม่ไปเก่า
            const rows = [...data].reverse();
            
            tbody.innerHTML = rows.map(item => {
                const isInput = item['Type (ประเภท)']?.includes('รับเข้า') || parseFloat(item['QTY(จำนวน)']) > 0;
                const typeClass = isInput ? 'text-green-600 bg-green-50' : 'text-rose-600 bg-rose-50';
                return `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 text-xs text-slate-400 font-medium">${formatDate(item['ประทับเวลา'])}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${typeClass}">${item['Type (ประเภท)'] || (isInput ? 'INPUT' : 'OUTPUT')}</span>
                        </td>
                        <td class="px-6 py-4 font-bold text-slate-600">${item['Proecess'] || '-'}</td>
                        <td class="px-6 py-4 font-medium text-slate-800">${item['Part Name '] || item['Part Name'] || '-'}</td>
                        <td class="px-6 py-4 text-center font-black ${isInput ? 'text-green-600' : 'text-rose-600'}">${item['QTY(จำนวน)']}</td>
                        <td class="px-6 py-4 text-xs text-slate-500">${item['By(โดย)'] || '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderInventory(data) {
            const tbody = document.getElementById('inventory-table-body');
            const stockMap = {};

            // คำนวณสต๊อกคงเหลือ
            data.forEach(item => {
                const name = (item['Part Name '] || item['Part Name'] || '').trim();
                if (!name) return;
                
                if (!stockMap[name]) {
                    stockMap[name] = { qty: 0, unit: item['Unit(หน่วย)'], process: item['Proecess'] };
                }
                stockMap[name].qty += parseFloat(item['QTY(จำนวน)'] || 0);
                stockMap[name].process = item['Proecess']; // เก็บโปรเซสล่าสุด
            });

            const items = Object.keys(stockMap).sort();
            tbody.innerHTML = items.map(name => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="px-6 py-4 font-bold text-slate-700">${name}</td>
                    <td class="px-6 py-4 text-xs text-slate-400">${stockMap[name].process || '-'}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="text-lg font-black ${stockMap[name].qty < 5 ? 'text-orange-500' : 'text-slate-900'}">
                            ${stockMap[name].qty}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-xs font-bold text-slate-300 uppercase">${stockMap[name].unit || 'PCS'}</td>
                </tr>
            `).join('');
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit');
            const formData = new FormData(e.target);
            const payload = Object.fromEntries(formData.entries());

            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin mx-auto"></i>';
            lucide.createIcons();

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.status === "success") {
                    closeModal();
                    e.target.reset();
                    refreshData();
                } else {
                    alert("Error: " + result.message);
                }
            } catch (err) {
                alert("ไม่สามารถส่งข้อมูลได้ โปรดตรวจสอบการตั้งค่า CORS ใน Apps Script");
            } finally {
                btn.disabled = false;
                btn.innerText = "บันทึกข้อมูลลงระบบ";
            }
        }

        function updateStats(data) {
            document.getElementById('stat-total').innerText = data.length;
            const ins = data.filter(r => parseFloat(r['QTY(จำนวน)']) > 0).length;
            const outs = data.filter(r => parseFloat(r['QTY(จำนวน)']) < 0).length;
            document.getElementById('stat-in').innerText = ins;
            document.getElementById('stat-out').innerText = outs;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('tab-' + tabId + '-btn').classList.add('nav-active');
            
            const titles = { 'dashboard': 'แดชบอร์ดสรุปผล', 'inventory': 'รายการสต๊อกคงเหลือ', 'records': 'ประวัติรายการ' };
            document.getElementById('page-title').innerText = titles[tabId];
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function setLoading(s) { s ? document.getElementById('loader').classList.remove('hidden') : document.getElementById('loader').classList.add('hidden'); }
        function formatDate(d) { return d ? new Date(d).toLocaleString('th-TH', { hour12: false }) : '-'; }
    </script>
</body>
</html>
