<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>H9 Spare Parts Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Prompt', sans-serif; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800">
  <div class="max-w-7xl mx-auto px-4 py-8 md:px-8">
    <header class="mb-6">
      <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
        <p class="text-xs text-blue-600 font-semibold tracking-wide uppercase">Spare parts for production line H9</p>
        <h1 class="text-2xl md:text-3xl font-bold mt-1">ระบบดูอะไหล่สำรอง (Stock H9)</h1>
        <p class="text-slate-500 mt-2 text-sm md:text-base">ดึงข้อมูลจาก Google Sheet (Apps Script) พร้อมคำนวณ Need to PO อัตโนมัติ</p>
      </div>
    </header>

    <section class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6" id="stat-cards"></section>

    <section class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 md:p-6">
      <div class="flex flex-col md:flex-row md:items-center gap-3 md:gap-4 mb-4">
        <input id="searchInput" type="text" placeholder="ค้นหาอะไหล่ / รุ่น / แบรนด์" class="w-full md:flex-1 rounded-xl border border-slate-300 px-4 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none" />
        <select id="categoryFilter" class="w-full md:w-56 rounded-xl border border-slate-300 px-4 py-2.5 bg-white">
          <option value="all">ทุกหมวดหมู่</option>
        </select>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left text-slate-500 border-b border-slate-200">
              <th class="py-3 pr-4">#</th>
              <th class="py-3 pr-4">Name / Description</th>
              <th class="py-3 pr-4">Model</th>
              <th class="py-3 pr-4">Line</th>
              <th class="py-3 pr-4">Category</th>
              <th class="py-3 pr-4">Brand</th>
              <th class="py-3 pr-4 text-center">Stock</th>
              <th class="py-3 pr-4 text-center">Min</th>
              <th class="py-3 pr-4 text-center">Max</th>
              <th class="py-3 pr-4 text-center">Need to PO</th>
            </tr>
          </thead>
          <tbody id="partsTable" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzux-h9XBiryXx2TBdgH1FpIiMf0Jr3FHEO09XvAO70a6Qfk2JQXe4yoF56P_FdROF48w/exec';

    const tableBody = document.getElementById('partsTable');
    const categoryFilter = document.getElementById('categoryFilter');
    const searchInput = document.getElementById('searchInput');

    let partsData = [];

    const safeNum = (value) => {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : 0;
    };

    function normalizeRecord(item, index) {
      const stock = safeNum(item.stock ?? item.qty);
      const min = safeNum(item.min ?? item.qtyMin);
      const max = safeNum(item.max ?? item.qtyMax);
      const needToPO = item.needToPO != null ? safeNum(item.needToPO) : Math.max(min - stock, 0);

      return {
        no: item.no ?? index + 1,
        name: item.name ?? item.partName ?? '-',
        model: item.model ?? '-',
        line: item.line ?? item.mainLine ?? item.process ?? '-',
        category: item.category ?? 'General',
        brand: item.brand ?? '-',
        stock,
        min,
        max,
        needToPO,
      };
    }


    function loadViaJsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = `partsCallback_${Date.now()}_${Math.floor(Math.random() * 10000)}`;
        const sep = url.includes('?') ? '&' : '?';
        const script = document.createElement('script');

        window[callbackName] = (payload) => {
          cleanup();
          resolve(payload);
        };

        const cleanup = () => {
          delete window[callbackName];
          script.remove();
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('ไม่สามารถโหลดข้อมูล (JSONP) ได้'));
        };

        script.src = `${url}${sep}callback=${callbackName}&t=${Date.now()}`;
        document.body.appendChild(script);
      });
    }

    async function loadPartsData() {
      tableBody.innerHTML = '<tr><td colspan="10" class="py-8 text-center text-slate-400">กำลังโหลดข้อมูล...</td></tr>';

      try {
        let rawData;

        try {
          const response = await fetch(`${API_URL}?t=${Date.now()}`);
          if (!response.ok) throw new Error(`โหลดข้อมูลไม่สำเร็จ (${response.status})`);
          rawData = await response.json();
        } catch (fetchError) {
          rawData = await loadViaJsonp(API_URL);
        }

        if (!Array.isArray(rawData)) throw new Error('รูปแบบข้อมูลไม่ถูกต้อง');

        partsData = rawData
          .map(normalizeRecord)
          .filter(item => item.name && item.name !== '-');

        populateCategoryOptions(partsData);
        applyFilters();
      } catch (err) {
        tableBody.innerHTML = `<tr><td colspan="10" class="py-8 text-center text-rose-500">${err.message}</td></tr>`;
        document.getElementById('stat-cards').innerHTML = '';
      }
    }

    function populateCategoryOptions(data) {
      categoryFilter.innerHTML = '<option value="all">ทุกหมวดหมู่</option>';
      const categories = [...new Set(data.map(item => item.category))].sort();
      categories.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat;
        option.textContent = cat;
        categoryFilter.appendChild(option);
      });
    }

    function renderStats(data) {
      const total = data.length;
      const needPO = data.filter(item => item.needToPO > 0).length;
      const electrical = data.filter(item => item.category === 'Electrical').length;
      const zeroStock = data.filter(item => item.stock === 0).length;

      document.getElementById('stat-cards').innerHTML = `
        <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm"><p class="text-xs text-slate-500">รายการทั้งหมด</p><p class="text-2xl font-bold">${total}</p></div>
        <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm"><p class="text-xs text-slate-500">ต้องสั่งซื้อ (Need PO)</p><p class="text-2xl font-bold text-amber-600">${needPO}</p></div>
        <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm"><p class="text-xs text-slate-500">หมวด Electrical</p><p class="text-2xl font-bold text-blue-600">${electrical}</p></div>
        <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm"><p class="text-xs text-slate-500">Stock = 0</p><p class="text-2xl font-bold text-rose-600">${zeroStock}</p></div>
      `;
    }

    function renderTable(data) {
      if (!data.length) {
        tableBody.innerHTML = '<tr><td colspan="10" class="py-8 text-center text-slate-400">ไม่พบข้อมูลตามเงื่อนไขค้นหา</td></tr>';
        return;
      }

      tableBody.innerHTML = data.map(item => {
        const lowStock = item.stock <= item.min && item.min > 0;
        return `
          <tr class="hover:bg-slate-50">
            <td class="py-3 pr-4 font-medium">${item.no}</td>
            <td class="py-3 pr-4">${item.name}</td>
            <td class="py-3 pr-4 text-slate-600">${item.model}</td>
            <td class="py-3 pr-4 text-slate-600">${item.line}</td>
            <td class="py-3 pr-4">${item.category}</td>
            <td class="py-3 pr-4">${item.brand}</td>
            <td class="py-3 pr-4 text-center font-semibold ${lowStock ? 'text-rose-600' : ''}">${item.stock}</td>
            <td class="py-3 pr-4 text-center">${item.min}</td>
            <td class="py-3 pr-4 text-center">${item.max}</td>
            <td class="py-3 pr-4 text-center">
              <span class="px-2 py-1 rounded-full text-xs font-semibold ${item.needToPO > 0 ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}">
                ${item.needToPO > 0 ? item.needToPO : 'OK'}
              </span>
            </td>
          </tr>
        `;
      }).join('');
    }

    function applyFilters() {
      const keyword = searchInput.value.trim().toLowerCase();
      const category = categoryFilter.value;

      const filtered = partsData.filter(item => {
        const hitSearch = [item.name, item.model, item.brand].join(' ').toLowerCase().includes(keyword);
        const hitCategory = category === 'all' || item.category === category;
        return hitSearch && hitCategory;
      });

      renderTable(filtered);
      renderStats(filtered);
    }

    categoryFilter.addEventListener('change', applyFilters);
    searchInput.addEventListener('input', applyFilters);

    loadPartsData();
  </script>
</body>
</html>
